<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acesso | Transnet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
    <script src="{{ url_for('static', filename='lucide-0.263.0.min.js') }}"></script>
    <style>
        body { background-color: #0b0e14; }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-[0_0_50px_rgba(15,23,42,0.5)] relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-600 to-transparent"></div>

        <div class="text-center mb-8">
            <div class="inline-flex p-4 bg-blue-500/10 rounded-full mb-4 text-blue-400 border border-blue-500/20">
                <i data-lucide="lock-keyhole" size="32"></i>
            </div>
            <h1 class="text-2xl font-black text-white uppercase italic tracking-wider neon-text">Recuperar Senha</h1>
            <p class="text-slate-500 text-xs font-bold mt-2 uppercase">Informe seus dados de cadastro</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-6 bg-blue-500/10 border border-blue-500/20 text-blue-200 px-4 py-3 rounded-xl text-xs font-bold text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1 ml-1">Usuário do Sistema</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-3.5 text-slate-500" size="18"></i>
                    <input type="text" name="username" required placeholder="ex: vinicius.tnetlog" 
                           class="w-full bg-slate-800 border border-slate-700 text-white pl-12 p-3 rounded-xl focus:border-blue-500 focus:bg-slate-800/80 outline-none transition-all font-bold text-sm">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1 ml-1">E-mail Cadastrado</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 text-slate-500" size="18"></i>
                    <input type="email" name="email" required placeholder="seu.email@transnet.com.br" 
                           class="w-full bg-slate-800 border border-slate-700 text-white pl-12 p-3 rounded-xl focus:border-blue-500 focus:bg-slate-800/80 outline-none transition-all font-bold text-sm">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.3)] uppercase tracking-widest transition-all mt-6 flex items-center justify-center gap-2 group">
                <span>Enviar Link</span>
                <i data-lucide="arrow-right" size="18" class="group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-800 pt-6">
            <a href="{{ url_for('login') }}" class="text-xs font-bold text-slate-500 hover:text-white transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" size="14"></i> Voltar para Login
            </a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
